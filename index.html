<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Meu Banco WoW — SandWorlds</title>
  <style>
    :root {
      --bg:     #0a0806;
      --bg2:    #130f08;
      --bg3:    #1c160e;
      --border: #6b5a2a;
      --gold:   #ffd700;
      --text:   #d4b483;
      --muted:  #888;
      --q0: #9d9d9d; --q1: #ffffff; --q2: #1eff00;
      --q3: #0070dd; --q4: #a335ee; --q5: #ff8000;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Segoe UI', sans-serif;
      font-size: 14px;
      min-height: 100vh;
    }

    header {
      background: linear-gradient(180deg, #1a1208 0%, #0a0806 100%);
      border-bottom: 2px solid var(--border);
      padding: 18px 32px;
      display: flex; align-items: center; gap: 16px;
    }
    header h1 { color: var(--gold); font-size: 22px; font-weight: 700; letter-spacing: 0.5px; }
    header span { color: var(--muted); font-size: 13px; }
    .badge {
      background: #2a1f08; border: 1px solid var(--border);
      color: var(--gold); font-size: 11px; padding: 2px 8px; border-radius: 4px;
    }

    .container { max-width: 900px; margin: 0 auto; padding: 28px 24px; }

    /* Character selector */
    .char-bar { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 20px; }
    .char-btn {
      background: var(--bg2); border: 1px solid var(--border);
      color: var(--text); padding: 7px 18px; border-radius: 4px;
      cursor: pointer; font-size: 13px; font-weight: 600;
      transition: all 0.15s;
    }
    .char-btn:hover { border-color: var(--gold); color: var(--gold); }
    .char-btn.active { background: #2a1f08; border-color: var(--gold); color: var(--gold); }

    /* Info bar */
    .info-bar {
      display: flex; gap: 20px; flex-wrap: wrap; align-items: center;
      background: var(--bg3); border: 1px solid #2a2010;
      border-radius: 4px; padding: 10px 16px; margin-bottom: 18px;
    }
    .info-bar .lbl { color: var(--muted); font-size: 12px; }
    .info-bar .val { color: var(--gold); font-weight: 700; margin-left: 4px; font-size: 13px; }

    /* Stats */
    .stats-bar {
      display: flex; gap: 20px;
      background: var(--bg3); border: 1px solid #2a2010;
      border-radius: 4px; padding: 10px 16px; margin-bottom: 18px;
    }
    .stat { text-align: center; }
    .stat-val { font-size: 22px; font-weight: 700; color: var(--gold); }
    .stat-lbl { font-size: 11px; color: var(--muted); }

    /* Tabs */
    .tabs {
      display: flex; gap: 4px; margin-bottom: 16px;
      border-bottom: 1px solid #2a2010;
    }
    .tab-btn {
      background: none; border: none;
      border-bottom: 3px solid transparent;
      color: var(--muted); padding: 10px 20px;
      cursor: pointer; font-size: 13px; font-weight: 600;
      transition: all 0.15s;
    }
    .tab-btn:hover { color: var(--text); }
    .tab-btn.active { color: var(--gold); border-bottom-color: var(--gold); }
    .tab-count {
      background: #2a2010; color: var(--muted);
      border-radius: 10px; padding: 1px 7px; font-size: 11px; margin-left: 6px;
    }

    /* Search */
    input[type="text"] {
      width: 100%; background: transparent; border: 1px solid var(--border);
      border-radius: 4px; color: var(--text); font-size: 13px;
      padding: 8px 12px; outline: none; margin-bottom: 16px;
      transition: border-color 0.2s;
    }
    input[type="text"]:focus { border-color: var(--gold); }
    input[type="text"]::placeholder { color: #555; }

    /* Item list */
    .item-row {
      display: flex; align-items: center; justify-content: space-between;
      padding: 6px 0; border-bottom: 1px solid #1a1408; font-size: 13px;
    }
    .item-row:last-child { border-bottom: none; }
    .item-left { display: flex; align-items: center; gap: 8px; }

    .q-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
    .q-dot-0{background:var(--q0)} .q-dot-1{background:var(--q1)}
    .q-dot-2{background:var(--q2)} .q-dot-3{background:var(--q3)}
    .q-dot-4{background:var(--q4)} .q-dot-5{background:var(--q5)}

    .q0{color:var(--q0)} .q1{color:var(--q1)} .q2{color:var(--q2)}
    .q3{color:var(--q3)} .q4{color:var(--q4)} .q5{color:var(--q5)}

    a.item-link { text-decoration: none; transition: opacity 0.15s; }
    a.item-link:hover { opacity: 0.75; text-decoration: underline; }

    .item-meta { display: flex; gap: 12px; align-items: center; }
    .item-count {
      background: #1a1408; border: 1px solid #2a2010;
      color: var(--gold); font-size: 11px; font-weight: 700;
      padding: 1px 7px; border-radius: 3px; min-width: 28px; text-align: center;
    }
    .item-qlabel { color: var(--muted); font-size: 11px; min-width: 56px; text-align: right; }

    .card {
      background: var(--bg2); border: 1px solid var(--border);
      border-radius: 6px; padding: 20px;
    }

    .state-msg {
      text-align: center; color: var(--muted);
      padding: 48px 24px; font-size: 13px;
    }

    footer {
      border-top: 1px solid #1a1408; padding: 16px 32px;
      text-align: center; color: var(--muted); font-size: 12px; margin-top: 32px;
    }
    footer a { color: #666; text-decoration: none; }
    footer a:hover { color: var(--gold); }
  </style>
  <script>var whTooltips = {colorLinks: false, iconSize: 'medium', renameLinks: false};</script>
  <script src="https://classicdb.ch/templates/wowhead/js/power.js" async></script>
</head>
<body>

<header>
  <div>
    <h1>🎒 Meu Banco WoW</h1>
    <span>Bags &amp; Baú dos personagens — SandWorlds 1.12.1</span>
  </div>
  <div class="badge">BANCO</div>
</header>

<div class="container">

  <div id="char-bar" class="char-bar"></div>

  <div id="info-bar" class="info-bar" style="display:none"></div>

  <div id="stats-bar" class="stats-bar" style="display:none">
    <div class="stat"><div class="stat-val" id="stat-bags">0</div><div class="stat-lbl">Itens nas Bags</div></div>
    <div class="stat"><div class="stat-val" id="stat-bank">0</div><div class="stat-lbl">Itens no Baú</div></div>
    <div class="stat"><div class="stat-val" id="stat-total">0</div><div class="stat-lbl">Total</div></div>
  </div>

  <div class="tabs" id="tabs" style="display:none">
    <button class="tab-btn active" id="tab-bags" onclick="showTab('bags')">
      Bags <span class="tab-count" id="count-bags">0</span>
    </button>
    <button class="tab-btn" id="tab-bank" onclick="showTab('bank')">
      Baú <span class="tab-count" id="count-bank">0</span>
    </button>
  </div>

  <div id="search-wrap" style="display:none">
    <input type="text" id="search" placeholder="Filtrar por nome de item..." oninput="renderItems()" />
  </div>

  <div class="card" id="item-card" style="display:none">
    <div id="item-list"></div>
  </div>

  <div id="state-msg" class="state-msg">Selecione um personagem acima.</div>

</div>

<footer>
  Addon <strong>KZ_Banco</strong> &nbsp;·&nbsp; SandWorlds 1.12.1
  &nbsp;·&nbsp;
  <a href="https://github.com/worldkkevin-boop/meu-banco-wow" target="_blank">github.com/worldkkevin-boop/meu-banco-wow</a>
</footer>

<script>
const Q_CLASS = ["q0","q1","q2","q3","q4","q5"];
const Q_DOT   = ["q-dot-0","q-dot-1","q-dot-2","q-dot-3","q-dot-4","q-dot-5"];
const Q_NAME  = ["Pobre","Comum","Incomum","Raro","Épico","Lendário"];

let currentData = null;
let currentTab  = 'bags';

function escHtml(s) {
  return (s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
}

function refreshTooltips() {
  try {
    const WoWH = window.$WH || window.WH;
    if (!WoWH) return;
    if (WoWH.Tooltip && WoWH.Tooltip.bindTriggers) WoWH.Tooltip.bindTriggers();
    else if (WoWH.Tooltip && WoWH.Tooltip.init)    WoWH.Tooltip.init();
    else if (WoWH.init) WoWH.init();
  } catch(e) {}
}

function renderItems() {
  const filter = (document.getElementById("search").value || "").toLowerCase();
  const source = currentTab === 'bags' ? (currentData.bags||[]) : (currentData.bank||[]);

  const filtered = filter
    ? source.filter(i => i.name.toLowerCase().indexOf(filter) !== -1)
    : source;

  const list = document.getElementById("item-list");

  if (filtered.length === 0) {
    list.innerHTML = '<div style="color:var(--muted);text-align:center;padding:24px;">' +
      (filter ? 'Nenhum item encontrado para "' + escHtml(filter) + '".' : 'Nenhum item aqui.') + '</div>';
    return;
  }

  // Ordena por qualidade desc, depois nome
  const sorted = filtered.slice().sort(function(a, b) {
    if ((b.quality||0) !== (a.quality||0)) return (b.quality||0) - (a.quality||0);
    return (a.name||"").localeCompare(b.name||"");
  });

  list.innerHTML = sorted.map(function(item) {
    const q = Math.min(Math.max(item.quality||0, 0), 5);
    const hasId = item.id && item.id !== "" && item.id !== "0";

    const nameHtml = hasId
      ? '<a href="https://classicdb.ch/?item=' + item.id + '" rel="item=' + item.id + '" class="item-link ' + Q_CLASS[q] + '" target="_blank">' + escHtml(item.name) + '</a>'
      : '<span class="' + Q_CLASS[q] + '">' + escHtml(item.name) + '</span>';

    const countHtml = item.count > 1
      ? '<span class="item-count">x' + item.count + '</span>'
      : '';

    return '<div class="item-row">' +
      '<div class="item-left">' +
        '<div class="q-dot ' + Q_DOT[q] + '"></div>' +
        nameHtml +
        '<span style="color:var(--muted);font-size:11px;">' + Q_NAME[q] + '</span>' +
      '</div>' +
      '<div class="item-meta">' +
        countHtml +
      '</div>' +
    '</div>';
  }).join("");

  setTimeout(refreshTooltips, 150);
}

function showTab(tab) {
  currentTab = tab;
  document.getElementById("tab-bags").className = "tab-btn" + (tab === "bags" ? " active" : "");
  document.getElementById("tab-bank").className = "tab-btn" + (tab === "bank" ? " active" : "");
  renderItems();
}

async function loadIndex() {
  try {
    const res = await fetch("data/index.json?v=" + Date.now());
    if (!res.ok) return null;
    return await res.json();
  } catch(e) { return null; }
}

async function loadChar(file) {
  const res = await fetch("data/" + file + "?v=" + Date.now());
  if (!res.ok) throw new Error("nao encontrado");
  return await res.json();
}

function setStateMsg(msg) {
  document.getElementById("state-msg").style.display = "";
  document.getElementById("state-msg").innerHTML = msg;
  document.getElementById("item-card").style.display = "none";
}

function hideStateMsg() {
  document.getElementById("state-msg").style.display = "none";
  document.getElementById("item-card").style.display = "";
}

async function selectChar(file, btnEl) {
  document.querySelectorAll(".char-btn").forEach(function(b) { b.classList.remove("active"); });
  if (btnEl) btnEl.classList.add("active");

  document.getElementById("tabs").style.display = "none";
  document.getElementById("info-bar").style.display = "none";
  document.getElementById("stats-bar").style.display = "none";
  document.getElementById("search-wrap").style.display = "none";
  setStateMsg("Carregando...");

  try {
    currentData = await loadChar(file);
  } catch(e) {
    setStateMsg("❌ Erro ao carregar dados do personagem.");
    return;
  }

  const bags = currentData.bags || [];
  const bank = currentData.bank || [];

  // Conta totais (somando counts)
  let bagTotal = 0, bankTotal = 0;
  bags.forEach(function(i) { bagTotal += (i.count||1); });
  bank.forEach(function(i) { bankTotal += (i.count||1); });

  // Info bar
  const ib = document.getElementById("info-bar");
  ib.style.display = "flex";
  ib.innerHTML =
    '<div><span class="lbl">Personagem:</span><span class="val">' + escHtml(currentData.character) + '</span></div>' +
    '<div><span class="lbl">Realm:</span><span class="val">' + escHtml(currentData.realm) + '</span></div>' +
    '<div><span class="lbl">Atualizado:</span><span class="val">' + escHtml(currentData.lastUpdate) + '</span></div>';

  // Stats
  document.getElementById("stat-bags").textContent  = bags.length;
  document.getElementById("stat-bank").textContent  = bank.length;
  document.getElementById("stat-total").textContent = bags.length + bank.length;
  document.getElementById("stats-bar").style.display = "flex";

  // Tab counts
  document.getElementById("count-bags").textContent = bags.length;
  document.getElementById("count-bank").textContent = bank.length;

  document.getElementById("tabs").style.display = "flex";
  document.getElementById("search-wrap").style.display = "";
  document.getElementById("search").value = "";

  currentTab = "bags";
  document.getElementById("tab-bags").className = "tab-btn active";
  document.getElementById("tab-bank").className = "tab-btn";

  hideStateMsg();
  renderItems();
}

async function init() {
  const index = await loadIndex();
  const bar = document.getElementById("char-bar");

  if (!index || index.length === 0) {
    setStateMsg("📭 Nenhum dado disponível ainda.<br><small>Abra o baú no jogo e rode sync_banco.ps1.</small>");
    return;
  }

  bar.innerHTML = index.map(function(entry, i) {
    return '<button class="char-btn" id="cbtn-' + i + '" onclick="selectChar(\'' + entry.file + '\', this)">' +
      escHtml(entry.char) + '</button>';
  }).join("");

  selectChar(index[0].file, document.getElementById("cbtn-0"));
}

init();
</script>
</body>
</html>
