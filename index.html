<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Meu Banco WoW — SandWorlds</title>
  <style>
    :root {
      --bg:     #0a0806;
      --bg2:    #130f08;
      --bg3:    #1c160e;
      --border: #6b5a2a;
      --gold:   #ffd700;
      --text:   #d4b483;
      --muted:  #777;
      --q0: #9d9d9d; --q1: #e0e0e0; --q2: #1eff00;
      --q3: #0070dd; --q4: #a335ee; --q5: #ff8000;
    }
    *{box-sizing:border-box;margin:0;padding:0;}
    body{background:var(--bg);color:var(--text);font-family:'Segoe UI',sans-serif;font-size:13px;min-height:100vh;}

    /* HEADER */
    header{
      background:linear-gradient(180deg,#1a1208 0%,#0d0a05 100%);
      border-bottom:2px solid var(--border);
      padding:14px 24px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px;
    }
    .logo{color:var(--gold);font-size:20px;font-weight:700;letter-spacing:.5px;}
    .logo span{color:var(--muted);font-size:12px;font-weight:400;margin-left:10px;}
    .import-toggle{
      background:linear-gradient(180deg,#3d2d08,#1a1208);border:1px solid var(--border);
      color:var(--gold);padding:7px 16px;border-radius:4px;cursor:pointer;font-size:12px;font-weight:600;
      transition:all .15s;
    }
    .import-toggle:hover{background:linear-gradient(180deg,#5a4210,#2a1f08);}

    /* IMPORT PANEL */
    .import-panel{
      background:#0f0c06;border-bottom:1px solid var(--border);
      padding:16px 24px;display:none;
    }
    .import-panel.open{display:block;}
    .import-inner{max-width:900px;margin:0 auto;display:flex;gap:16px;align-items:flex-start;flex-wrap:wrap;}
    textarea{
      flex:1;min-width:200px;background:transparent;border:1px solid var(--border);border-radius:4px;
      color:var(--text);font-family:'Courier New',monospace;font-size:11px;
      padding:8px;resize:vertical;min-height:60px;outline:none;transition:border-color .2s;
    }
    textarea:focus{border-color:var(--gold);}
    textarea::placeholder{color:#444;}
    .btn{
      padding:8px 18px;border-radius:4px;border:none;cursor:pointer;font-size:12px;font-weight:600;transition:all .15s;white-space:nowrap;
    }
    .btn-green{background:linear-gradient(180deg,#0e3a12,#071a09);border:1px solid #1eff00;color:#1eff00;}
    .btn-green:hover{background:linear-gradient(180deg,#185a1e,#0e2e12);}
    .btn-sm{background:none;border:1px solid #333;color:#666;font-size:11px;padding:5px 10px;}
    .btn-sm:hover{border-color:#555;color:#999;}
    .alert{padding:7px 12px;border-radius:4px;font-size:12px;margin-top:8px;display:none;}
    .alert.show{display:block;}
    .alert-ok{background:#0e2e10;border:1px solid #1eff00;color:#1eff00;}
    .alert-err{background:#2e0e0e;border:1px solid #f55;color:#f88;}

    /* TOOLBAR */
    .toolbar{
      background:#0d0a05;border-bottom:1px solid #1a1408;
      padding:10px 24px;display:flex;align-items:center;gap:12px;flex-wrap:wrap;
    }
    .toolbar-max{max-width:1400px;margin:0 auto;width:100%;display:flex;align-items:center;gap:12px;flex-wrap:wrap;}

    /* Char tabs */
    .char-tabs{display:flex;gap:4px;}
    .char-tab{
      background:var(--bg3);border:1px solid #2a2010;color:var(--muted);
      padding:5px 14px;border-radius:4px;cursor:pointer;font-size:12px;font-weight:600;transition:all .15s;
    }
    .char-tab:hover{border-color:var(--gold);color:var(--text);}
    .char-tab.active{background:#2a1f08;border-color:var(--gold);color:var(--gold);}

    /* Source tabs */
    .source-tabs{display:flex;gap:2px;margin-left:4px;}
    .src-btn{
      background:none;border:none;border-bottom:2px solid transparent;
      color:var(--muted);padding:5px 14px;cursor:pointer;font-size:12px;font-weight:600;transition:all .15s;
    }
    .src-btn:hover{color:var(--text);}
    .src-btn.active{color:var(--gold);border-bottom-color:var(--gold);}
    .src-count{background:#1a1408;color:var(--muted);border-radius:9px;padding:1px 6px;font-size:10px;margin-left:4px;}

    /* Search */
    .search-wrap{flex:1;min-width:160px;max-width:260px;position:relative;}
    .search-wrap input{
      width:100%;background:#0d0a05;border:1px solid #2a2010;border-radius:4px;
      color:var(--text);font-size:12px;padding:6px 10px 6px 28px;outline:none;transition:border-color .2s;
    }
    .search-wrap input:focus{border-color:var(--gold);}
    .search-wrap input::placeholder{color:#444;}
    .search-icon{position:absolute;left:8px;top:50%;transform:translateY(-50%);color:#444;font-size:13px;pointer-events:none;}

    /* Quality filters */
    .q-filters{display:flex;gap:4px;align-items:center;}
    .q-filter{
      width:22px;height:22px;border-radius:3px;border:2px solid transparent;
      cursor:pointer;transition:all .15s;opacity:.4;
    }
    .q-filter.on{opacity:1;transform:scale(1.1);}
    .q-filter[data-q="0"]{background:var(--q0);border-color:#777;}
    .q-filter[data-q="1"]{background:#888;border-color:#bbb;}
    .q-filter[data-q="2"]{background:#0a3a0a;border-color:var(--q2);}
    .q-filter[data-q="3"]{background:#001a3a;border-color:var(--q3);}
    .q-filter[data-q="4"]{background:#1a003a;border-color:var(--q4);}
    .q-filter[data-q="5"]{background:#2a1000;border-color:var(--q5);}

    /* ilvl filter */
    .ilvl-wrap{display:flex;align-items:center;gap:6px;color:var(--muted);font-size:11px;}
    .ilvl-wrap input[type=range]{accent-color:var(--gold);width:80px;}
    .ilvl-val{color:var(--gold);font-weight:700;min-width:28px;}

    /* Sort */
    select{
      background:#0d0a05;border:1px solid #2a2010;color:var(--text);
      font-size:11px;padding:5px 8px;border-radius:4px;outline:none;cursor:pointer;
    }

    /* CONTENT */
    .content{max-width:1400px;margin:0 auto;padding:20px 24px;}

    /* Stats bar */
    .stats{display:flex;gap:20px;margin-bottom:16px;flex-wrap:wrap;}
    .stat{background:var(--bg3);border:1px solid #1a1408;border-radius:4px;padding:8px 16px;text-align:center;}
    .stat-val{font-size:20px;font-weight:700;color:var(--gold);}
    .stat-lbl{font-size:10px;color:var(--muted);}

    /* ITEM GRID */
    .item-grid{
      display:grid;
      grid-template-columns:repeat(auto-fill,minmax(80px,1fr));
      gap:6px;
    }

    .item-card{
      position:relative;background:var(--bg2);border:1px solid #1a1408;
      border-radius:4px;cursor:pointer;transition:all .15s;
      display:flex;flex-direction:column;align-items:center;padding:6px 4px 5px;
      min-width:0;
    }
    .item-card:hover{border-color:#3a3020;background:#1c1810;transform:translateY(-1px);}

    .item-icon-wrap{
      position:relative;width:56px;height:56px;flex-shrink:0;
      border-radius:4px;overflow:hidden;
    }
    .item-icon-wrap img{width:100%;height:100%;display:block;object-fit:cover;}
    .icon-placeholder{
      width:56px;height:56px;border-radius:4px;
      display:flex;align-items:center;justify-content:center;
      font-size:22px;background:#0d0a05;
    }

    /* Quality border glow */
    .item-card.q0 .item-icon-wrap{box-shadow:0 0 0 2px var(--q0);}
    .item-card.q1 .item-icon-wrap{box-shadow:0 0 0 2px #aaa;}
    .item-card.q2 .item-icon-wrap{box-shadow:0 0 6px rgba(30,255,0,.5),0 0 0 2px var(--q2);}
    .item-card.q3 .item-icon-wrap{box-shadow:0 0 8px rgba(0,112,221,.6),0 0 0 2px var(--q3);}
    .item-card.q4 .item-icon-wrap{box-shadow:0 0 10px rgba(163,53,238,.7),0 0 0 2px var(--q4);}
    .item-card.q5 .item-icon-wrap{box-shadow:0 0 12px rgba(255,128,0,.8),0 0 0 2px var(--q5);}

    /* Count badge */
    .item-badge{
      position:absolute;bottom:2px;right:3px;
      color:#fff;font-size:10px;font-weight:700;line-height:1;
      text-shadow:-1px -1px 0 #000,1px -1px 0 #000,-1px 1px 0 #000,1px 1px 0 #000;
    }

    /* ilvl badge */
    .ilvl-badge{
      position:absolute;top:2px;left:3px;
      color:#ffd700;font-size:9px;font-weight:700;line-height:1;
      text-shadow:-1px -1px 0 #000,1px -1px 0 #000,-1px 1px 0 #000,1px 1px 0 #000;
    }

    .item-name{
      width:100%;text-align:center;font-size:10px;line-height:1.3;
      margin-top:4px;word-break:break-word;overflow:hidden;
      display:-webkit-box;-webkit-line-clamp:2;line-clamp:2;-webkit-box-orient:vertical;
    }
    .q0{color:var(--q0)}.q1c{color:#ccc}.q2{color:var(--q2)}.q3{color:var(--q3)}.q4{color:var(--q4)}.q5{color:var(--q5)}

    a.item-link{text-decoration:none;transition:opacity .15s;}
    a.item-link:hover{opacity:.75;text-decoration:underline;}

    a.icon-link{display:block;text-decoration:none;}
    a.icon-link:hover .item-icon-wrap{filter:brightness(1.2);}

    .subtype-badge{
      display:block;text-align:center;
      color:#666;font-size:9px;margin-top:1px;
      white-space:nowrap;overflow:hidden;text-overflow:ellipsis;width:100%;
    }

    .empty{color:var(--muted);text-align:center;padding:60px 20px;font-size:13px;}
    .empty .big{font-size:40px;margin-bottom:12px;}

    /* IMPORT modal-style inline */
    .how{color:var(--muted);font-size:11px;line-height:1.8;margin-top:8px;}
    .how code{color:var(--gold);}

    /* Responsive */
    @media(max-width:600px){
      .item-grid{grid-template-columns:repeat(auto-fill,minmax(64px,1fr));}
      .item-icon-wrap,.icon-placeholder{width:48px;height:48px;}
    }

    footer{border-top:1px solid #1a1408;padding:14px 24px;text-align:center;color:#444;font-size:11px;margin-top:32px;}
    footer a{color:#555;text-decoration:none;}
    footer a:hover{color:var(--gold);}

    /* WoW-style tooltip */
    #kz-tt{
      display:none;position:fixed;z-index:9999;
      background:linear-gradient(180deg,#120c04 0%,#0a0600 100%);
      border:1px solid #6b5a2a;border-radius:3px;
      padding:10px 12px;min-width:180px;max-width:290px;
      font-size:12px;pointer-events:none;
      box-shadow:0 0 20px rgba(0,0,0,.9);
    }
    .tt-name{font-size:14px;font-weight:700;margin-bottom:5px;}
    .tt-ilvl{color:#ffd700;font-size:11px;margin-bottom:3px;}
    .tt-row{display:flex;justify-content:space-between;color:#c8c8c8;font-size:11px;margin:1px 0;}
    .tt-line{color:#c8c8c8;font-size:11px;margin:1px 0;}
    .tt-stat{color:#1eff00;font-size:11px;margin:1px 0;}
    .tt-bind{color:#c8c8c8;font-size:11px;margin:2px 0;}
    .tt-req{color:#c8c8c8;font-size:11px;margin:2px 0;}
    .tt-desc{color:#ffd700;font-style:italic;font-size:11px;margin-top:4px;word-break:break-word;}
    .tt-sep{border-top:1px solid #2a2010;margin:5px 0;}
    .tt-db-badge{color:#555;font-size:9px;margin-top:6px;text-align:right;}
  </style>
  <script>var whTooltips={colorLinks:false,iconSize:'medium',renameLinks:false};</script>
  <script src="https://classicdb.ch/templates/wowhead/js/power.js" async></script>
</head>
<body>

<header>
  <div class="logo">🎒 Meu Banco WoW <span>SandWorlds 1.12.1</span></div>
  <button class="import-toggle" onclick="toggleImport()">⬆ Importar Dados</button>
</header>

<div class="import-panel" id="import-panel">
  <div class="import-inner">
    <div style="flex:1;min-width:200px;">
      <textarea id="import-input" rows="3" placeholder="Cole o código BANCO1 aqui (gerado com /banco no jogo)..."></textarea>
      <div id="import-alert" class="alert"></div>
      <div class="how">
        No jogo: <code>/banco guild</code> → passe o mouse nos slots → <code>/banco guild</code> → <code>/banco</code> → Ctrl+A, Ctrl+C e cole aqui.
      </div>
    </div>
    <div style="display:flex;flex-direction:column;gap:8px;">
      <button class="btn btn-green" onclick="doImport()">Importar</button>
      <button class="btn btn-sm" onclick="clearAll()">Limpar tudo</button>
    </div>
  </div>
</div>

<div class="toolbar">
  <div class="toolbar-max">
    <div class="char-tabs" id="char-tabs"></div>
    <div class="source-tabs" id="source-tabs"></div>
    <div class="search-wrap">
      <span class="search-icon">🔍</span>
      <input type="text" id="search" placeholder="Buscar item..." oninput="render()">
    </div>
    <div class="q-filters" title="Filtrar por qualidade">
      <div class="q-filter on" data-q="0" title="Pobre" onclick="toggleQ(0)"></div>
      <div class="q-filter on" data-q="1" title="Comum" onclick="toggleQ(1)"></div>
      <div class="q-filter on" data-q="2" title="Incomum" onclick="toggleQ(2)"></div>
      <div class="q-filter on" data-q="3" title="Raro" onclick="toggleQ(3)"></div>
      <div class="q-filter on" data-q="4" title="Épico" onclick="toggleQ(4)"></div>
      <div class="q-filter on" data-q="5" title="Lendário" onclick="toggleQ(5)"></div>
    </div>
    <div class="ilvl-wrap">
      <span>ilvl ≥</span>
      <input type="number" id="ilvl-min" min="0" max="999" value="0" oninput="updateIlvl();render()" style="width:54px;background:#0d0a05;border:1px solid #2a2010;border-radius:4px;color:var(--gold);font-size:12px;font-weight:700;padding:5px 6px;outline:none;text-align:center;">
    </div>
    <select id="sort-select" onchange="render()">
      <option value="quality">Qualidade</option>
      <option value="name">Nome A-Z</option>
      <option value="ilvl">Item Level</option>
      <option value="count">Quantidade</option>
    </select>
  </div>
</div>

<div class="content">
  <div class="stats" id="stats" style="display:none">
    <div class="stat"><div class="stat-val" id="s-bags">0</div><div class="stat-lbl">Bags</div></div>
    <div class="stat"><div class="stat-val" id="s-bank">0</div><div class="stat-lbl">Baú</div></div>
    <div class="stat"><div class="stat-val" id="s-guild">0</div><div class="stat-lbl">Guilda</div></div>
    <div class="stat"><div class="stat-val" id="s-total">0</div><div class="stat-lbl">Total</div></div>
    <div class="stat"><div class="stat-val" id="s-update" style="font-size:11px;padding-top:6px;"></div><div class="stat-lbl">Atualizado</div></div>
  </div>
  <div class="item-grid" id="item-grid"></div>
  <div class="empty" id="empty-msg"><div class="big">🎒</div>Importe dados acima para começar.</div>
</div>

<div id="kz-tt"></div>

<footer>
  <strong>KZ_Banco</strong> addon · SandWorlds 1.12.1 ·
  <a href="https://github.com/worldkkevin-boop/meu-banco-wow" target="_blank">GitHub</a>
</footer>

<script>
var DB = {};
var currentChar  = null;
var currentTab   = 'bags';
var activeQ      = {0:true,1:true,2:true,3:true,4:true,5:true};
var ilvlMin      = 0;

var Q_NAME  = ["Pobre","Comum","Incomum","Raro","Épico","Lendário"];
var Q_COLOR = ["#9d9d9d","#e0e0e0","#1eff00","#0070dd","#a335ee","#ff8000"];
var Q_CLASS = ["q0","q1c","q2","q3","q4","q5"];

// Item database from itemcache.wdb
var ITEM_DB = {};
var dbLoaded = false;

function fetchItemDB(){
  try{
    var xhr=new XMLHttpRequest();
    xhr.open('GET','items_db.json',true);
    xhr.onload=function(){
      if(xhr.status===200){
        try{
          ITEM_DB=JSON.parse(xhr.responseText);
          dbLoaded=true;
          if(currentChar&&DB[currentChar]) render();
        }catch(e){}
      }
    };
    xhr.send();
  }catch(e){}
}

function getDbEntry(id){
  if(!id||id==="0"||!dbLoaded) return null;
  return ITEM_DB[id]||null;
}

function enrichItem(item){
  var db=getDbEntry(item.id);
  if(!db) return item;
  return{
    id:item.id, name:item.name, quality:item.quality,
    count:item.count, icon:item.icon,
    ilvl:item.ilvl||db.ilvl||0,
    itype:item.itype||db.itype||"",
    isubtype:item.isubtype||db.isubtype||"",
  };
}

function buildTooltipHtml(item,db){
  if(!db) return "";
  var q=Math.min(Math.max(item.quality||0,0),5);
  var html='<div class="tt-name" style="color:'+Q_COLOR[q]+'">'+escHtml(db.name||item.name)+'</div>';
  if(db.ilvl>0) html+='<div class="tt-ilvl">Item Level '+db.ilvl+'</div>';
  if(db.isubtype||db.slot){
    html+='<div class="tt-row"><span>'+escHtml(db.isubtype||db.itype||"")+'</span><span>'+escHtml(db.slot||"")+'</span></div>';
  }
  if(db.armor>0) html+='<div class="tt-line">'+db.armor+' Armadura</div>';
  if(db.dmgMin>0||db.dmgMax>0){
    html+='<div class="tt-line">'+db.dmgMin+' – '+db.dmgMax+' Dano</div>';
    if(db.speed>0){
      var spd=(db.speed/1000).toFixed(2);
      var dps=(((db.dmgMin+db.dmgMax)/2)/(db.speed/1000)).toFixed(1);
      html+='<div class="tt-row"><span>Velocidade '+spd+'</span><span>('+dps+' dano/s)</span></div>';
    }
  }
  if(db.stats&&db.stats.length>0){
    html+='<div class="tt-sep"></div>';
    for(var i=0;i<db.stats.length;i++){
      var s=db.stats[i];
      html+='<div class="tt-stat">'+(s.value>0?'+':'')+s.value+' '+escHtml(s.label)+'</div>';
    }
  }
  if(db.bind){html+='<div class="tt-sep"></div><div class="tt-bind">'+escHtml(db.bind)+'</div>';}
  if(db.reqLevel>0) html+='<div class="tt-req">Requer Nível '+db.reqLevel+'</div>';
  if(db.desc) html+='<div class="tt-sep"></div><div class="tt-desc">'+escHtml(db.desc)+'</div>';
  return html;
}

var _ttTimer=null;
function showTT(e,el){
  var id=el.getAttribute('data-id');
  var q=parseInt(el.getAttribute('data-q')||'1');
  var db=getDbEntry(id);
  if(!db) return;
  var tt=document.getElementById('kz-tt');
  tt.innerHTML=buildTooltipHtml({quality:q},db);
  tt.style.display='block';
  posTT(e);
}
function hideTT(){ document.getElementById('kz-tt').style.display='none'; }
function posTT(e){
  var tt=document.getElementById('kz-tt');
  if(tt.style.display==='none') return;
  var x=e.clientX+16, y=e.clientY+16;
  var w=tt.offsetWidth, h=tt.offsetHeight;
  if(x+w>window.innerWidth-8) x=e.clientX-w-8;
  if(y+h>window.innerHeight-8) y=e.clientY-h-8;
  tt.style.left=x+'px'; tt.style.top=y+'px';
}
document.addEventListener('mousemove',function(e){ posTT(e); });

function loadStorage(){ try{ var r=localStorage.getItem("kzbanco_db"); if(r) DB=JSON.parse(r); }catch(e){ DB={}; } }
function saveStorage(){ try{ localStorage.setItem("kzbanco_db",JSON.stringify(DB)); }catch(e){} }

function escHtml(s){ return (s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;"); }

function iconUrl(icon){
  if(!icon||icon==="") return null;
  return "https://wow.zamimg.com/images/wow/icons/large/"+icon.toLowerCase()+".jpg";
}

// ---- PARSE ----
function parseItems(str){
  var items=[];
  if(!str||str==="") return items;
  var entries=str.split("|");
  for(var i=0;i<entries.length;i++){
    var e=entries[i].split(":");
    if(e.length<4) continue;
    items.push({
      id:      e[0]||"0",
      name:    e[1]||"?",
      quality: parseInt(e[2])||0,
      count:   parseInt(e[3])||1,
      icon:    e[4]||"",
      ilvl:    parseInt(e[5])||0,
      itype:   e[6]||"",
      isubtype:e[7]||"",
    });
  }
  return items;
}

function parseCode(code){
  code=(code||"").trim();
  if(code.indexOf("BANCO1;")!==0) return null;
  var p=code.split(";");
  if(p.length<4) return null;
  return{
    char:      p[1],
    lastUpdate:p[2],
    bags:      parseItems(p[3]),
    bank:      parseItems(p[4]||""),
    guild:     parseItems(p[5]||""),
  };
}

// ---- IMPORT ----
function toggleImport(){
  var p=document.getElementById("import-panel");
  p.classList.toggle("open");
}

function doImport(){
  var code=(document.getElementById("import-input").value||"").trim();
  if(!code){ showAlert("import-alert","Cole um código BANCO1 primeiro.",false); return; }
  var parsed=parseCode(code);
  if(!parsed){ showAlert("import-alert","Código inválido. Deve começar com BANCO1;",false); return; }
  DB[parsed.char]={ lastUpdate:parsed.lastUpdate, bags:parsed.bags, bank:parsed.bank, guild:parsed.guild };
  saveStorage();
  showAlert("import-alert","Importado! Bags:"+parsed.bags.length+" Baú:"+parsed.bank.length+" Guilda:"+parsed.guild.length,true);
  document.getElementById("import-input").value="";
  renderCharTabs();
  selectChar(parsed.char);
  document.getElementById("import-panel").classList.remove("open");
}

function clearAll(){
  if(!confirm("Apagar tudo?")) return;
  DB={}; currentChar=null; saveStorage();
  renderCharTabs(); renderSourceTabs(); renderEmpty();
}

function showAlert(id,msg,ok){
  var el=document.getElementById(id);
  el.textContent=msg;
  el.className="alert show "+(ok?"alert-ok":"alert-err");
  setTimeout(function(){ el.classList.remove("show"); },4000);
}

// ---- CHAR TABS ----
function renderCharTabs(){
  var bar=document.getElementById("char-tabs");
  var chars=Object.keys(DB);
  if(chars.length===0){ bar.innerHTML=""; return; }
  bar.innerHTML=chars.map(function(n){
    return '<div class="char-tab'+(n===currentChar?" active":"")+'" onclick="selectChar(\''+escHtml(n)+'\')">'+escHtml(n)+'</div>';
  }).join("");
}

function selectChar(name){
  currentChar=name;
  currentTab="bags";
  renderCharTabs();
  renderSourceTabs();
  renderStats();
  render();
}

// ---- SOURCE TABS ----
function renderSourceTabs(){
  var el=document.getElementById("source-tabs");
  if(!currentChar||!DB[currentChar]){ el.innerHTML=""; return; }
  var d=DB[currentChar];
  var tabs=[
    {key:"bags",  label:"Bags",   count:(d.bags||[]).length},
    {key:"bank",  label:"Baú",    count:(d.bank||[]).length},
    {key:"guild", label:"Guilda", count:(d.guild||[]).length},
  ];
  el.innerHTML=tabs.map(function(t){
    return '<button class="src-btn'+(currentTab===t.key?" active":"")+'" onclick="setTab(\''+t.key+'\')">'
      +t.label+'<span class="src-count">'+t.count+'</span></button>';
  }).join("");
}

function setTab(tab){
  currentTab=tab;
  renderSourceTabs();
  render();
}

// ---- STATS ----
function renderStats(){
  if(!currentChar||!DB[currentChar]){
    document.getElementById("stats").style.display="none"; return;
  }
  var d=DB[currentChar];
  document.getElementById("s-bags").textContent   =(d.bags||[]).length;
  document.getElementById("s-bank").textContent   =(d.bank||[]).length;
  document.getElementById("s-guild").textContent  =(d.guild||[]).length;
  document.getElementById("s-total").textContent  =(d.bags||[]).length+(d.bank||[]).length+(d.guild||[]).length;
  document.getElementById("s-update").textContent =d.lastUpdate||"";
  document.getElementById("stats").style.display  ="flex";
}

// ---- FILTERS ----
function toggleQ(q){
  activeQ[q]=!activeQ[q];
  var el=document.querySelector(".q-filter[data-q='"+q+"']");
  if(el) el.classList.toggle("on",activeQ[q]);
  render();
}

function updateIlvl(){
  ilvlMin=parseInt(document.getElementById("ilvl-min").value)||0;
}

// ---- RENDER ----
function renderEmpty(){
  document.getElementById("item-grid").innerHTML="";
  document.getElementById("empty-msg").style.display="";
  document.getElementById("stats").style.display="none";
}

function render(){
  if(!currentChar||!DB[currentChar]){ renderEmpty(); return; }
  var d=DB[currentChar];
  var source= currentTab==="bags"?(d.bags||[]): currentTab==="bank"?(d.bank||[]):(d.guild||[]);

  var filter=(document.getElementById("search").value||"").toLowerCase();
  var sort=document.getElementById("sort-select").value;

  var filtered=source.filter(function(item){
    if(!activeQ[item.quality]) return false;
    if(item.ilvl<ilvlMin) return false;
    if(filter && item.name.toLowerCase().indexOf(filter)===-1) return false;
    return true;
  });

  filtered=filtered.slice().sort(function(a,b){
    if(sort==="quality") return (b.quality||0)-(a.quality||0)||(a.name||"").localeCompare(b.name||"");
    if(sort==="name")    return (a.name||"").localeCompare(b.name||"");
    if(sort==="ilvl")    return (b.ilvl||0)-(a.ilvl||0);
    if(sort==="count")   return (b.count||0)-(a.count||0);
    return 0;
  });

  var grid=document.getElementById("item-grid");
  var emsg=document.getElementById("empty-msg");

  if(filtered.length===0){
    grid.innerHTML="";
    emsg.innerHTML="<div class='big'>🔍</div>"+(filter?"Nenhum resultado para \""+escHtml(filter)+"\"":"Nenhum item aqui.");
    emsg.style.display="";
    return;
  }

  emsg.style.display="none";

  grid.innerHTML=filtered.map(function(raw){
    var item=enrichItem(raw);
    var q=Math.min(Math.max(item.quality||0,0),5);
    var qc=Q_CLASS[q];
    var hasId=item.id&&item.id!=="0"&&item.id!=="";
    var hasDb=hasId&&dbLoaded&&!!ITEM_DB[item.id];
    var icon=iconUrl(item.icon);
    var imgTag=icon
      ? '<img src="'+icon+'" onerror="this.src=\'https://wow.zamimg.com/images/wow/icons/large/inv_misc_questionmark.jpg\'" alt="" loading="lazy"/>'
      : '<img src="https://wow.zamimg.com/images/wow/icons/large/inv_misc_questionmark.jpg" alt=""/>';

    var countBadge=item.count>1?'<span class="item-badge">'+item.count+'</span>':'';
    var ilvlBadge=item.ilvl>0?'<span class="ilvl-badge">'+item.ilvl+'</span>':'';

    var iconInner='<div class="item-icon-wrap">'+imgTag+countBadge+ilvlBadge+'</div>';

    // Ícone: hover = nosso tooltip do DB local
    var ttAttr=hasDb
      ? ' data-id="'+item.id+'" data-q="'+q+'" onmouseenter="showTT(event,this)" onmouseleave="hideTT()"' : '';
    var iconWrap=hasId
      ? '<a href="https://classicdb.ch/?item='+item.id+'" target="_blank" class="icon-link"'+ttAttr+'>'+iconInner+'</a>'
      : '<div class="item-icon-wrap"'+ttAttr+'>'+imgTag+countBadge+ilvlBadge+'</div>';

    // Nome: hover = tooltip classicdb (rel="item=ID")
    var nameHtml=hasId
      ? '<a href="https://classicdb.ch/?item='+item.id+'" rel="item='+item.id+'" class="item-link '+qc+'" target="_blank">'+escHtml(item.name)+'</a>'
      : '<span class="'+qc+'">'+escHtml(item.name)+'</span>';

    var subtypeBadge=item.isubtype&&item.isubtype!=""
      ? '<span class="subtype-badge">'+escHtml(item.isubtype)+'</span>' : '';

    return '<div class="item-card '+qc+'">'
      +iconWrap
      +'<div class="item-name">'+nameHtml+'</div>'
      +subtypeBadge
      +'</div>';
  }).join("");

  setTimeout(function(){
    try{if(window.$WH&&$WH.Tooltip&&$WH.Tooltip.bindTriggers)$WH.Tooltip.bindTriggers();}catch(e){}
  },200);
}

// ---- INIT ----
loadStorage();
fetchItemDB();
var initChars=Object.keys(DB);
if(initChars.length>0){
  renderCharTabs();
  selectChar(initChars[0]);
} else {
  document.getElementById("import-panel").classList.add("open");
}
</script>
</body>
</html>
